# 本地开发依赖。端口只绑定回环地址，避免数据库与 Redis 暴露到局域网。
services:
  mysql:
    image: mysql:8.0
    container_name: qoj-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-qoj-mysql-change-me-2026}
      MYSQL_DATABASE: qoj
    ports:
      - "127.0.0.1:13306:3306"
    # 统一使用 utf8mb4，确保题面、代码和用户资料可保存完整 Unicode 字符。
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - qoj-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-qoj-mysql-change-me-2026}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: qoj-redis
    # 本地环境仍要求密码，保持与后端默认连接配置一致。
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-qoj-redis-change-me-2026}"]
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - qoj-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-qoj-redis-change-me-2026}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  # 使用命名卷保留重启后的开发数据；删除卷会清空对应服务状态。
  qoj-mysql-data:
  qoj-redis-data:
