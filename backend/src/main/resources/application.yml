# HTTP 入口限制：端口可由环境变量覆盖，表单与被中止请求均设置明确上限以控制内存占用。
server:
  port: ${SERVER_PORT:18080}
  max-http-request-header-size: 16KB
  tomcat:
    # CCPCOJ uses URL-encoded forms; bound parsing prevents oversized public requests.
    max-http-form-post-size: 64KB
    max-swallow-size: 2MB

# 后台路径前缀与前端 VITE_ADMIN_PREFIX 必须保持一致，避免管理路由暴露在意外地址。
admin:
  path-prefix: ${ADMIN_PATH_PREFIX:admin}

# Spring 基础设施：数据库、Redis、邮件、迁移与上传限制均从环境变量读取生产值。
spring:
  application:
    name: qoj-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:13306}/${MYSQL_DATABASE:qoj}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:qoj-mysql-change-me-2026}
    hikari:
      connection-init-sql: "SET time_zone = '${MYSQL_SESSION_TIME_ZONE:+08:00}'"
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:qoj-redis-change-me-2026}
      timeout: 2s
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_STARTTLS:true}
            required: ${MAIL_STARTTLS:true}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis-Plus 只负责字段命名映射；业务查询条件仍由各 Mapper/Service 显式声明。
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

# QOJ 自有安全与判题参数。生产环境启动校验会拒绝默认 JWT 密钥和空判题令牌。
qoj:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-bytes}
    access-token-ttl-seconds: ${JWT_ACCESS_EXPIRE:900}    # 15 分钟（默认改为更安全的值）
    refresh-token-ttl-seconds: ${JWT_REFRESH_EXPIRE:604800}  # 7 天
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
  go-judge:
    # Only the backend may access this fixed internal endpoint; browsers never receive it.
    base-url: ${GO_JUDGE_BASE_URL:http://127.0.0.1:15050}
    auth-token: ${GO_JUDGE_AUTH_TOKEN:}
    connect-timeout-ms: ${GO_JUDGE_CONNECT_TIMEOUT_MS:2000}
    request-timeout-ms: ${GO_JUDGE_REQUEST_TIMEOUT_MS:200000}
    compile-timeout-ms: ${GO_JUDGE_COMPILE_TIMEOUT_MS:20000}
    max-source-bytes: ${GO_JUDGE_MAX_SOURCE_BYTES:65536}
    max-input-bytes: ${GO_JUDGE_MAX_INPUT_BYTES:2097152}
    max-output-bytes: ${GO_JUDGE_MAX_OUTPUT_BYTES:2097152}
    max-processes: ${GO_JUDGE_MAX_PROCESSES:32}
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
